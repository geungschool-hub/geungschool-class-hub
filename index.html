<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>7반 허브</title>
    <meta name="description" content="우리 반 학급 앱을 한곳에서 — 학급 포털, 영단어, 1인 1역 등." />
    <style>
      /* =========================================================
         담임(반) 허브 — 학생용 학급 앱 런처.
         ▶ 매년 학급이 바뀌면 아래 <script>의 HUB_NAME 만 바꾸세요 (예: '8반 허브').
         ▶ 앱 추가/수정은 CONTENTS 배열에 카드 한 칸만 추가하면 됩니다.
         ========================================================= */
      :root {
        --bg: #f6f1ea;
        --bg2: #efe7db;
        --card: #ffffff;
        --text: #2a2118;
        --muted: #6b6055;
        --line: #e4d8c7;
        --accent: #c0530f;
        --shadow: 0 6px 22px rgba(90, 60, 20, 0.1);
        --shadow-hover: 0 12px 30px rgba(90, 60, 20, 0.18);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
      }
      body {
        font-family:
          'Pretendard', system-ui, -apple-system, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
        color: var(--text);
        background:
          radial-gradient(1100px 480px at 50% -180px, #f3e3cd 0%, transparent 70%),
          linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
        background-attachment: fixed;
        min-height: 100vh;
        line-height: 1.6;
      }
      .wrap {
        max-width: 1080px;
        margin: 0 auto;
        padding: 40px 20px 64px;
      }
      header {
        text-align: center;
        margin-bottom: 26px;
      }
      .logo {
        font-size: 40px;
        line-height: 1;
      }
      h1 {
        margin: 10px 0 6px;
        font-size: clamp(26px, 5vw, 38px);
        letter-spacing: -0.5px;
      }
      .subtitle {
        margin: 0;
        color: var(--muted);
        font-size: clamp(14px, 2.6vw, 17px);
      }
      .home-link {
        display: inline-block;
        margin-top: 12px;
        color: var(--accent);
        font-size: 13px;
        font-weight: 700;
        text-decoration: none;
      }

      .controls {
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
        margin: 24px 0 22px;
      }
      .search {
        width: min(420px, 100%);
        position: relative;
      }
      .search input {
        width: 100%;
        padding: 13px 16px 13px 42px;
        font-size: 16px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fff;
        color: var(--text);
        box-shadow: var(--shadow);
      }
      .search input:focus {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }
      .search .icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 16px;
        opacity: 0.5;
      }
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
      }
      .chip {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--muted);
        border-radius: 999px;
        padding: 8px 16px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        min-height: 40px;
      }
      .chip.on {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 18px;
      }
      .card {
        display: flex;
        flex-direction: column;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 20px;
        text-decoration: none;
        color: inherit;
        box-shadow: var(--shadow);
        transition:
          transform 0.16s ease,
          box-shadow 0.16s ease;
        position: relative;
        min-height: 184px;
      }
      a.card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-hover);
      }
      a.card:focus-visible {
        outline: 3px solid var(--accent);
        outline-offset: 2px;
      }
      .card.soon {
        opacity: 0.72;
        cursor: default;
      }
      .card-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .emoji {
        width: 52px;
        height: 52px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        font-size: 28px;
      }
      .tag {
        font-size: 12px;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 999px;
      }
      .card h2 {
        margin: 0 0 6px;
        font-size: 19px;
      }
      .card p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        flex: 1;
      }
      .card-go {
        margin-top: 14px;
        font-size: 14px;
        font-weight: 700;
        color: var(--accent);
      }
      .badge-soon {
        font-size: 12px;
        font-weight: 700;
        color: #8a6d12;
        background: #fdeecb;
        padding: 4px 10px;
        border-radius: 999px;
      }
      .empty {
        grid-column: 1 / -1;
        text-align: center;
        color: var(--muted);
        padding: 40px 0;
        font-size: 15px;
      }
      footer {
        margin-top: 48px;
        padding-top: 18px;
        border-top: 1px solid var(--line);
        text-align: center;
        color: var(--muted);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="logo">🏫</div>
        <h1 id="hub-title">7반 허브</h1>
        <p class="subtitle">우리 반 학습·생활 앱을 한곳에서 만나요!</p>
        <a class="home-link" href="https://geungschool-hub.github.io/">← 긍스쿨 허브로</a>
      </header>

      <div class="controls">
        <div class="search">
          <span class="icon">🔍</span>
          <input id="search" type="search" placeholder="앱 검색 (예: 영단어, 포털)" aria-label="앱 검색" />
        </div>
        <div class="chips" id="chips" role="group" aria-label="구분 필터"></div>
      </div>

      <main class="grid" id="grid"></main>

      <footer>Claude AI로 이 앱을 제작함 by 고은표</footer>
    </div>

    <script>
      /* =========================================================
         ▼ 매년 학급이 바뀌면 이 이름만 변경 (예: '8반 허브')
         ========================================================= */
      const HUB_NAME = '7반 허브';

      /* ▼▼▼ 학급 앱 목록 — 새 앱을 만들면 여기에 카드 한 칸 추가 ▼▼▼
         { title, desc, url, group(구분), emoji, status('live'|'soon') } */
      const CONTENTS = [
        {
          title: '학급 포털',
          desc: '우리 반 공지·안내를 확인하는 학급 포털.',
          url: 'https://geungschool-hub.github.io/class7portal/',
          group: '학급',
          emoji: '🏫',
          status: 'live',
        },
        {
          title: '영단어 학습',
          desc: '꾸준함이 생명인 영단어 암기 챌린지!',
          url: 'https://gongju7-vocab.web.app/',
          group: '학습',
          emoji: '📚',
          status: 'live',
        },
        {
          title: '1인 1역 기록',
          desc: '내가 맡은 1인 1역 활동을 직접 기록해요.',
          url: 'https://geungschool-hub.github.io/1p1t/',
          group: '생활',
          emoji: '✅',
          status: 'live',
        },
        {
          title: '번호 뽑기',
          desc: '수업·활동에서 쓰는 무작위 번호 뽑기.',
          url: 'https://geungschool-hub.github.io/random-picker/',
          group: '활동',
          emoji: '🎲',
          status: 'live',
        },
        {
          title: '얼리버드',
          desc: '얼리버드 활동 앱.',
          url: 'https://geungschool-hub.github.io/early-bird/',
          group: '활동',
          emoji: '🐤',
          status: 'live',
        },
        {
          title: '두근두근 자리뽑기',
          desc: '두근두근 설레는 자리 뽑기 (반별 저장).',
          url: 'https://geungschool-hub.github.io/ai-tool/class%20seat%20change/두근두근_자리뽑기_v2_마개조%20버전.html',
          group: '활동',
          emoji: '🪑',
          status: 'live',
        },
      ];
      /* ▲▲▲ 여기까지만 고치면 됩니다 ▲▲▲ */

      const GROUP_COLORS = {
        학급: { fg: '#c0530f', bg: '#fcebdc' },
        학습: { fg: '#1255a0', bg: '#e2ecf8' },
        생활: { fg: '#2a7a38', bg: '#e6f4e9' },
        활동: { fg: '#7d3c98', bg: '#f0e6f5' },
        예고: { fg: '#8a6d12', bg: '#fdeecb' },
      };
      const DEFAULT_COLOR = { fg: '#665', bg: '#f1ece4' };
      const colorOf = (g) => GROUP_COLORS[g] || DEFAULT_COLOR;

      // 제목 적용
      document.getElementById('hub-title').textContent = HUB_NAME;
      document.title = HUB_NAME;

      const grid = document.getElementById('grid');
      const chipsBox = document.getElementById('chips');
      const searchInput = document.getElementById('search');
      let activeGroup = '전체';
      let query = '';

      const groups = ['전체', ...Array.from(new Set(CONTENTS.map((c) => c.group)))];
      function renderChips() {
        chipsBox.innerHTML = '';
        groups.forEach((g) => {
          const b = document.createElement('button');
          b.className = 'chip' + (g === activeGroup ? ' on' : '');
          b.textContent = g;
          b.onclick = () => {
            activeGroup = g;
            renderChips();
            renderCards();
          };
          chipsBox.appendChild(b);
        });
      }

      function matches(c) {
        if (activeGroup !== '전체' && c.group !== activeGroup) return false;
        if (!query) return true;
        return (c.title + ' ' + c.desc + ' ' + c.group).toLowerCase().includes(query);
      }

      function renderCards() {
        const list = CONTENTS.filter(matches);
        grid.innerHTML = '';
        if (list.length === 0) {
          grid.innerHTML = '<div class="empty">조건에 맞는 앱이 없어요. 검색어나 구분을 바꿔 보세요.</div>';
          return;
        }
        list.forEach((c) => {
          const col = colorOf(c.group);
          const isSoon = c.status === 'soon';
          const el = document.createElement(isSoon ? 'div' : 'a');
          el.className = 'card' + (isSoon ? ' soon' : '');
          if (!isSoon) {
            el.href = c.url;
            el.target = '_blank';
            el.rel = 'noopener';
          }
          el.innerHTML = `
            <div class="card-top">
              <div class="emoji" style="background:${col.bg}">${c.emoji}</div>
              ${
                isSoon
                  ? '<span class="badge-soon">준비 중</span>'
                  : `<span class="tag" style="color:${col.fg};background:${col.bg}">${c.group}</span>`
              }
            </div>
            <h2>${c.title}</h2>
            <p>${c.desc}</p>
            ${isSoon ? '' : '<div class="card-go">열어 보기 →</div>'}
          `;
          grid.appendChild(el);
        });
      }

      searchInput.addEventListener('input', (e) => {
        query = e.target.value.trim().toLowerCase();
        renderCards();
      });

      renderChips();
      renderCards();
    </script>
  </body>
</html>
